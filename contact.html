<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - CineZone BD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0f;
            color: #ccc;
            font-family: Arial, sans-serif;
            line-height: 1.8
        }

        .nav {
            background: #0d0d12;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e50914
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #e50914;
            text-decoration: none
        }

        .logo span {
            color: #fff
        }

        .nav-links a {
            color: #bbb;
            font-size: 14px;
            text-decoration: none;
            margin-left: 20px
        }

        .nav-links a:hover {
            color: #e50914
        }

        .hero {
            background: linear-gradient(135deg, #1a0a2e, #0d1b4b);
            padding: 60px 24px;
            text-align: center
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px
        }

        .hero h1 span {
            color: #e50914
        }

        .hero p {
            color: #aaa;
            font-size: 15px
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px
        }

        .contact-card {
            background: #161620;
            border-radius: 10px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center
        }

        .contact-icon {
            font-size: 32px;
            margin-bottom: 10px
        }

        .contact-card h3 {
            color: #fff;
            font-size: 15px;
            margin-bottom: 6px
        }

        .contact-card a {
            color: #e50914;
            font-size: 13px;
            text-decoration: none
        }

        .form-box {
            background: #161620;
            border-radius: 10px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06)
        }

        .form-box h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 24px
        }

        .form-box h2 span {
            color: #e50914
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 11px 16px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            font-family: Arial, sans-serif
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #e50914
        }

        .form-group textarea {
            height: 130px;
            resize: vertical
        }

        .submit-btn {
            width: 100%;
            background: #e50914;
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px
        }

        .submit-btn:hover {
            background: #c0000f
        }

        .success {
            display: none;
            background: #0d2b0d;
            border: 1px solid #1a5c1a;
            color: #4caf50;
            padding: 14px;
            border-radius: 6px;
            text-align: center;
            margin-top: 14px;
            font-size: 14px
        }

        footer {
            background: #0d0d12;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 60px
        }

        @media(max-width:500px) {
            .contact-grid {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <nav class="nav">
        <a class="logo" href="/">&#127916; Cine<span>Zone</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about.html">About</a>
            <a href="/privacy.html">Privacy</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Contact <span>Us</span></h1>
        <p>We would love to hear from you!</p>
    </div>

    <div class="container">

        <div class="contact-grid">
            <div class="contact-card">
                <div class="contact-icon">&#128140;</div>
                <h3>Email Us</h3>
                <a href="mailto:cinezonebd@gmail.com">cinezonebd@gmail.com</a>
            </div>
            <div class="contact-card">
                <div class="contact-icon">&#127760;</div>
                <h3>Our Website</h3>
                <a href="https://cine-zone-tau.vercel.app" target="_blank">cine-zone-tau.vercel.app</a>
            </div>
        </div>

        <div class="form-box">
            <h2>Send Us a <span>Message</span></h2>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your name" />
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" />
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subject" placeholder="What is this about?" />
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" placeholder="Write your message here..."></textarea>
            </div>
            <button class="submit-btn" onclick="sendMsg()">&#9993; Send Message</button>
            <div class="success" id="successMsg">&#10003; Message sent successfully! We will get back to you soon.</div>
        </div>

    </div>

    <footer>
        &#169; 2025 CineZone BD &mdash; All rights reserved
    </footer>

    <script>
        function sendMsg() {
            var name = document.getElementById('name').value.trim();
            var email = document.getElementById('email').value.trim();
            var msg = document.getElementById('message').value.trim();
            if (!name || !email || !msg) {
                alert('Please fill in all required fields.');
                return;
            }
            // Open Gmail with pre-filled content
            var subject = document.getElementById('subject').value.trim() || 'Message from CineZone BD';
            var body = 'Name: ' + name + '\nEmail: ' + email + '\n\nMessage:\n' + msg;
            window.open('mailto:cinezonebd@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body));
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>

</html>
